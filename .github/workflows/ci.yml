name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - debug
          - release
          - asan-ubsan
          - tsan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/format.sh --check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 clang-tidy-18 clang-tools-18 libc++-18-dev libc++abi-18-dev

      - name: Configure
        # Clang uses libc++ so that C++23 <expected> is available regardless of
        # the system libstdc++ version.
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: -stdlib=libc++
        run: cmake --preset debug

      - name: Run clang-tidy
        run: run-clang-tidy-18 -p build/debug -warnings-as-errors='*' "$(pwd)/src" "$(pwd)/include"
