name: nightly

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  sanitized-tests:
    name: asan-ubsan full suite
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Configure ASan/UBSan
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset asan-ubsan

      - name: Build
        run: cmake --build --preset asan-ubsan --parallel

      - name: Run tests
        run: ctest --preset asan-ubsan --output-on-failure

  adversarial:
    name: adversarial tests (debug)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Run adversarial tests
        run: |
          ctest --preset debug --output-on-failure -R 'adversarial|storage|network_relay|restart_integration'

  benchmarks:
    name: benchmarks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Run benchmarks
        env:
          CC: gcc-14
          CXX: g++-14
        run: ./scripts/benchmark.sh

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results/
          if-no-files-found: warn
