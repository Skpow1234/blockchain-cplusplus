name: fuzz-smoke

on:
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fuzz-smoke:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang lld

      - name: Configure fuzzers
        env:
          CC: clang
          CXX: clang++
        run: cmake --preset fuzz

      - name: Build fuzzers
        run: cmake --build --preset fuzz --parallel

      - name: Fuzz transaction deserialization
        run: ./build/fuzz/fuzz/fuzz_deserialize_transaction -max_total_time=30

      - name: Fuzz block deserialization
        run: ./build/fuzz/fuzz/fuzz_deserialize_block -max_total_time=30
